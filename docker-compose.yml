x-celery-worker: &celery-worker
  image: wardrive-app
  command: /code/start_celery.sh
  volumes:
    - .:/code
  depends_on:
    wardrive:
      condition: service_started
    redis:
      condition: service_started
    rabbitmq:
      condition: service_started
  env_file: .env
  restart: on-failure

volumes:
  wardriving_postgres_db: {}
  redis_data: {}
  metabase_data: {}
  minio_data: {}
  static_volume:
  media_volume:
  # ctfd_logs:    # deprecated — CTFd reemplazado por wardrive-frontend
  # ctfd_uploads: # deprecated — CTFd reemplazado por wardrive-frontend

services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "8081:9001"
    env_file: .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: on-failure

  wardrive_db:
    image: postgres:17
    environment:
      POSTGRES_PASSWORD: postgres
    volumes:
      - wardriving_postgres_db:/var/lib/postgresql/data:Z
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: on-failure

  redis:
    image: "redis:alpine"
    volumes:
      - redis_data:/data
    restart: on-failure

  rabbitmq:
    image: rabbitmq:3.13-management
    restart: on-failure

  wardrive:
    build: .
    image: wardrive-app
    volumes:
      - .:/code
      - static_volume:/code/staticfiles
      - media_volume:/code/media
    command: /code/start.sh
    env_file: .env
    depends_on:
      wardrive_db:
        condition: service_healthy
    stdin_open: true
    tty: true
    restart: on-failure

  celery_proc_0:
    <<: *celery-worker
    environment:
      - QUEUE=proc_0

  celery_proc_1:
    <<: *celery-worker
    environment:
      - QUEUE=proc_1

  celery-beat:
    image: wardrive-app
    command: /code/start_celery_beat.sh
    volumes:
      - .:/code
    depends_on:
      wardrive:
        condition: service_started
      redis:
        condition: service_started
    env_file: .env
    restart: on-failure

  # ── wardrive-frontend ────────────────────────────────────────────────────────
  # SPA React (Bun + Vite + MUI) servida por nginx bajo /ctf/
  # Reemplaza ctfd_platform. Para desarrollo: usa el profile "dev" con volumen.
  wardrive-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_ANALYTICS_DEFAULT_START_DATE: ${VITE_ANALYTICS_DEFAULT_START_DATE}
        VITE_ANALYTICS_DEFAULT_END_DATE: ${VITE_ANALYTICS_DEFAULT_END_DATE}
        VITE_ANALYTICS_API_URL: ${VITE_ANALYTICS_API_URL}
        VITE_APP_TITLE: ${VITE_APP_TITLE}
        VITE_APP_FAVICON_URL: ${VITE_APP_FAVICON_URL}
        VITE_EVENT_HOME_TITLE: ${VITE_EVENT_HOME_TITLE}
        VITE_EVENT_HOME_BADGE: ${VITE_EVENT_HOME_BADGE}
        VITE_EVENT_INTRO_TEXT: ${VITE_EVENT_INTRO_TEXT}
        VITE_EVENT_DYNAMICS_TITLE: ${VITE_EVENT_DYNAMICS_TITLE}
        VITE_EVENT_DYNAMICS_TEXT: ${VITE_EVENT_DYNAMICS_TEXT}
        VITE_EVENT_LOGO_SECTION_TITLE: ${VITE_EVENT_LOGO_SECTION_TITLE}
        VITE_EVENT_LOGO_SECTION_TEXT: ${VITE_EVENT_LOGO_SECTION_TEXT}
        VITE_EVENT_LOGO_URL: ${VITE_EVENT_LOGO_URL}
        VITE_EVENT_LOGO_ALT: ${VITE_EVENT_LOGO_ALT}
        VITE_EVENT_LOGO_LINK_URL: ${VITE_EVENT_LOGO_LINK_URL}
        VITE_EVENT_LOGO_LINK_LABEL: ${VITE_EVENT_LOGO_LINK_LABEL}
    image: wardrive-frontend
    depends_on:
      - wardrive
    restart: on-failure
    # profiles:                 # descomenta para exponer en desarrollo directamente
    #   - dev
    # ports:
    #   - "5173:5173"           # solo para dev con bun run dev (sin build)

  # ── ctfd_platform (DEPRECATED) ───────────────────────────────────────────────
  # Sustituido por wardrive-frontend. Ejecuta ./cleanup_ctfd.sh para limpiar.
  # ctfd_platform:
  #   build:
  #     context: ./ctfd
  #     dockerfile: Dockerfile
  #   volumes:
  #     - ctfd_logs:/opt/CTFd/logs
  #     - ctfd_uploads:/opt/CTFd/uploads
  #   environment:
  #     - REVERSE_PROXY=true
  #     - APPLICATION_ROOT=/ctf
  #     - DATABASE_URL=postgresql://postgres:postgres@wardrive_db:5432/ctfd
  #     - UPLOAD_PROVIDER=s3
  #     - AWS_S3_BUCKET=${CTFD_S3_BUCKET:-ctfd}
  #     - AWS_S3_ENDPOINT_URL=http://minio:9000
  #     - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER:-minioadmin}
  #     - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
  #   depends_on:
  #     wardrive_db:
  #       condition: service_healthy
  #     minio:
  #       condition: service_healthy
  #   restart: on-failure

  wardrive_bi:
    image: metabase/metabase:v0.58.6
    env_file: .env
    volumes:
      - metabase_data:/metabase-data
    healthcheck:
      test: ["CMD", "curl", "--fail", "-I", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  analytics:
    build:
      context: ./analytics
      dockerfile: Dockerfile
    image: analytics:latest
    environment:
      LATITUDE__POSTGRES_DB: ${DB_NAME:-wardrive}
      LATITUDE__POSTGRES_USER: ${DB_USER:-postgres}
      LATITUDE__POSTGRES_PWD: ${DB_PASSWORD:-postgres}
      LATITUDE__POSTGRES_HOST: wardrive_db
      LATITUDE__POSTGRES_PORT: ${DB_PORT:-5432}
      LATITUDE__POSTGRES_SCHEMA: public
      LATITUDE_MASTER_KEY: ${LATITUDE_MASTER_KEY}
    depends_on:
      wardrive_db:
        condition: service_healthy
    ports:
      - "${ANALYTICS_BIND_IP:-0.0.0.0}:3001:3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const net=require('net');const s=net.connect(3000,'127.0.0.1');s.on('connect',()=>{s.end();process.exit(0)});s.on('error',()=>process.exit(1));setTimeout(()=>process.exit(1),3000);\""]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    restart: unless-stopped

  wardrive_proxy:
    image: nginx:1.28.0
    depends_on:
      - wardrive
      - wardrive_bi
      - wardrive-frontend
      - analytics
    ports:
      - "8000:8000"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - static_volume:/static:ro
      - media_volume:/media:ro
