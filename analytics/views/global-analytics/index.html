<svelte:head>
  <title>Global Analytics</title>
</svelte:head>

<View class="gap-8 py-4 h-full justify-center">

  <!-- Filtros -->
  <Card.Root>
    <Card.Content class="p-6">
      <Row class="gap-4 items-end flex-wrap">
        <Column>
          <Text.H5 class="font-medium mb-1">Desde</Text.H5>
          <DatePicker param="first_seen_start" value="2025-01-01" />
        </Column>
        <Column>
          <Text.H5 class="font-medium mb-1">Hasta</Text.H5>
          <DatePicker param="first_seen_end" value="2026-05-30" />
        </Column>
        <RunButton>Aplicar</RunButton>
      </Row>
    </Card.Content>
  </Card.Root>

  <!-- Fila de BarCharts -->
  <Row class="gap-6 flex-wrap">

    <Card.Root class="flex-1 min-w-[280px]">
      <Card.Content class="p-6">
        <BarChart
          query="global-analytics/auth-modes"
          title="Modos de Autenticación"
          description="Distribución global de auth_mode"
          x="auth_mode"
          y="qty_auth"
          xTitle="Modo"
          yTitle="Cantidad"
          opts={{ reactToParams: 500 }}
        />
      </Card.Content>
    </Card.Root>

    <Card.Root class="flex-1 min-w-[280px]">
      <Card.Content class="p-6">
        <BarChart
          query="global-analytics/by-device"
          title="Dispositivos"
          description="Distribución global por device_source"
          x="device_source"
          y="qty_device"
          xTitle="Dispositivo"
          yTitle="Cantidad"
          opts={{ reactToParams: 500 }}
        />
      </Card.Content>
    </Card.Root>

    <Card.Root class="flex-1 min-w-[280px]">
      <Card.Content class="p-6">
        <BarChart
          query="global-analytics/by-author"
          title="Contribuidores"
          description="Registros por usuario (uploaded_by)"
          x="uploaded_by"
          y="qty_by_author"
          xTitle="Usuario"
          yTitle="Cantidad"
          opts={{ reactToParams: 500 }}
        />
      </Card.Content>
    </Card.Root>

    <Card.Root class="flex-1 min-w-[280px]">
      <Card.Content class="p-6">
        <BarChart
          query="global-analytics/by-signal"
          title="Intensidad de Señal"
          description="Distribución global por signal_streng"
          x="signal_streng"
          y="qty_by_signal"
          xTitle="Señal"
          yTitle="Cantidad"
          opts={{ reactToParams: 500 }}
        />
      </Card.Content>
    </Card.Root>

    <Card.Root class="flex-1 min-w-[280px]">
      <Card.Content class="p-6">
        <BarChart
          query="global-analytics/by-vendor"
          title="Fabricantes"
          description="Top fabricantes detectados globalmente"
          x="vendor"
          y="qty_by_vendor"
          xTitle="Fabricante"
          yTitle="Cantidad"
          opts={{ reactToParams: 500 }}
        />
      </Card.Content>
    </Card.Root>

  </Row>

  <!-- BarChart de auth modes -->
  <Card.Root>
    <Card.Content class="p-8">
      <BarChart
        query="global-analytics/auth-modes"
        title="Modos de Autenticación (Global)"
        description="Distribución global de auth_mode"
        x="auth_mode"
        y="qty_auth"
        xTitle="Modo"
        yTitle="Cantidad"
        animation="true"
        opts={{ reactToParams: 500 }}
      />
    </Card.Content>
  </Card.Root>

  <!-- Tabla detalle -->
  <Card.Root>
    <Card.Content class="p-8">
      <Table
        query="global-analytics/detail"
        title="Detalle global de registros"
        description="Todos los registros del periodo seleccionado"
        opts={{ reactToParams: 500 }}
      />
    </Card.Content>
  </Card.Root>

</View>
