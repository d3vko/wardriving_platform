# /etc/nginx/nginx.conf
user  nginx;
worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # WebSocket: Connection header según Upgrade (HTTP normal → close; upgrade → upgrade)
  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;

  gzip on;
  gzip_types text/plain text/css application/json application/javascript application/xml text/xml image/svg+xml;
  gzip_min_length 1024;

  client_max_body_size 50M;

  # --- Upstreams (name = service from docker-compose) ---
  upstream wardrive_upstream {
    server wardrive:8000;
    keepalive 32;
  }

  upstream metabase_upstream {
    server wardrive_bi:3000;
    keepalive 16;
  }

  # upstream ctf_upstream (CTFd — deprecated, reemplazado por wardrive-frontend)
  # server ctfd_platform:8000;
  upstream frontend_upstream {
    server wardrive-frontend:80;
    keepalive 16;
  }

  upstream analytics_upstream {
    server analytics:3000;
    keepalive 8;
  }

  upstream minio_upstream {
    server minio:9000;
    keepalive 8;
  }

  server {
    listen 8000;
    server_name _;
    client_max_body_size 500M;
    error_log /var/log/nginx/error.log info;
    access_log /var/log/nginx/access.log combined;

    # ---- Static Wardrive (Django): desde MinIO (bucket wardrive-storage, prefijo static/) ----
    location /static-wardrive/ {
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_http_version 1.1;
      proxy_buffering off;
      proxy_pass http://minio_upstream/wardrive-storage/static/;
      access_log off;
      expires 30d;
      add_header Cache-Control "public, immutable";
    }
    location /wardriving/static-wardrive/ {
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_http_version 1.1;
      proxy_buffering off;
      proxy_pass http://minio_upstream/wardrive-storage/static/;
      access_log off;
      expires 30d;
      add_header Cache-Control "public, immutable";
    }

    # ---- Media (filesystem): use this when USE_S3_STORAGE=false ----
    #location /media/ {
    #  alias /media/;
    #  access_log off;
    #  expires 7d;
    #  add_header Cache-Control "public";
    #}
    # ---- Media (S3/MinIO): when USE_S3_STORAGE=true ----
     location /media/ {
       proxy_set_header Host $host;
       proxy_set_header X-Real-IP $remote_addr;
       proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
       proxy_set_header X-Forwarded-Proto $scheme;
       proxy_http_version 1.1;
       proxy_buffering off;
       proxy_request_buffering off;
       proxy_pass http://minio_upstream/media/;
       access_log off;
       expires 7d;
       add_header Cache-Control "public";
    }

    # ---- wardrive-frontend (React SPA bajo /ctf/) ----
    location = /ctf {
      return 301 /ctf/;
    }

    location /ctf/ {
      proxy_set_header Host              $http_host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      proxy_http_version 1.1;
      proxy_read_timeout 60;
      proxy_send_timeout 60;
      proxy_redirect off;

      proxy_pass http://frontend_upstream;
    }
    # ---- Guard rails admin Django bajo prefijo ----
    location = /wardriving/admin {
      return 301 /wardriving/admin/;
    }

    # El formulario de login de Django puede usar action /admin/login/ aun bajo prefijo.
    # 308 preserva método/body para que el POST de credenciales no se pierda.
    # No redirigimos todo /admin/ para no romper Metabase (/admin/settings, etc).
    location = /admin/login/ {
      return 308 /wardriving/admin/login/$is_args$args;
    }

    # ---- Django API (/wardriving -> wardrive) ----
    # Incluye HTTP REST y WebSocket (mapa/KML vía Daphne ASGI). Sin Upgrade/Connection
    # el handshake ws falla con 400/502.
    location /wardriving/ {
      proxy_set_header Host              $http_host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Prefix /wardriving;

      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;

      proxy_buffering off;
      proxy_read_timeout 300;
      proxy_send_timeout 300;
      # Cuando Django responda redirects internos a /admin/*, se reescriben al prefijo público.
      proxy_redirect ~^/admin/(.*)$ /wardriving/admin/$1;

      proxy_pass http://wardrive_upstream/;
    }

    # ---- Analytics API (/analytics -> analytics service) ----
    location = /analytics {
      return 301 /analytics/;
    }

    location /analytics/ {
      proxy_set_header Host              $http_host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host  $host;
      proxy_set_header X-Forwarded-Prefix /analytics;

      proxy_http_version 1.1;
      proxy_read_timeout 300;
      proxy_send_timeout 300;
      proxy_redirect off;

      proxy_pass http://analytics_upstream/;
    }

    # ---- Metabase (/bi -> wardrive_bi) ----
    location / {
      proxy_set_header Host              $http_host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;

      proxy_read_timeout 300;
      proxy_send_timeout 300;
      proxy_redirect off;
      proxy_pass http://metabase_upstream/;
    }
  }
}
