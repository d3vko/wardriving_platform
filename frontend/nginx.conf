server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               application/x-javascript text/xml application/xml text/javascript
               image/svg+xml font/ttf font/woff font/woff2;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_vary on;

    # Assets estaticos con cache larga (Vite los genera con hash en el nombre)
    location ~* /ctf/assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # Fallback SPA: toda ruta bajo /ctf/ se resuelve a index.html
    location /ctf/ {
        try_files $uri $uri/ /ctf/index.html;
    }

    # Redireccion sin trailing slash
    location = /ctf {
        return 301 /ctf/;
    }

    # Health check interno
    location = /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
